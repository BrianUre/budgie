services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "54320:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budgie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-budgie}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
